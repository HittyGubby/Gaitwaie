name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o "gateway_${{ matrix.goos }}_${{ matrix.goarch }}" -ldflags="-s -w" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway_${{ matrix.goos }}_${{ matrix.goarch }}
          path: gateway_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          # Also include install.sh in the release
          cp install.sh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Gaitwaie ${{ github.ref_name }}

            ### 安装

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sudo bash
            ```

            ### 更新日志

            查看 Releases 页面了解详情。
